# Export Service Configuration
# Controls limits for document export operations

[limits]
# Maximum input content size in bytes (default: 500MB for professional use)
max_content_length = 524288000

# Maximum output file size in bytes (default: 1GB for professional use)
max_output_size = 1073741824

# Maximum metadata field length in characters (default: 10000)
max_metadata_length = 10000

[typst]
# Typst rendering configuration

[typst.cache]
# Maximum number of cached Typst renderings
max_entries = 100

# Typst quality level: "standard", "high", or "aerospace"
default_quality = "standard"

[pdf_conversion]
# PDF to Office format conversion configuration

# Maximum PDF file size for conversion in bytes (default: 500MB)
max_pdf_size = 524288000

# Conversion timeout in seconds (default: 300 seconds = 5 minutes)
conversion_timeout_seconds = 300

[docx]
# DOCX export configuration

# Maximum HTML content length in bytes (default: 50MB)
max_html_length = 52428800

# Maximum Markdown content length in bytes (default: 50MB)
max_markdown_length = 52428800

# Maximum paragraph count (default: 10000)
max_paragraph_count = 10000

# Maximum table count (default: 1000)
max_table_count = 1000

# Maximum image count (default: 500)
max_image_count = 500

[pptx]
# PPTX export configuration

# Maximum HTML content length in bytes (default: 100MB)
max_html_length = 104857600

# Maximum Markdown content length in bytes (default: 100MB)
max_markdown_length = 104857600

# Maximum slide count (default: 1000)
max_slide_count = 1000

# Maximum output file size in bytes (default: 500MB)
max_output_size = 524288000

[pptx.media]
# PPTX media configuration

# Maximum audio size in MB (default: 100MB)
max_audio_size_mb = 100

# Maximum video size in MB (default: 500MB)
max_video_size_mb = 500

# Maximum media duration in seconds (default: 3600 = 1 hour)
max_duration_seconds = 3600

